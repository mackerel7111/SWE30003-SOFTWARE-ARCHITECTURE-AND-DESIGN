{% extends "base.html" %}

{% block title %}Vet Details | Pet First Aid{% endblock %}

{% block content %}
<h1 class="h3 mb-1">Vet Details</h1>
<p class="text-muted">Add clinic directory records for pet owners to search by region.</p>

{% if message %}
    <div class="alert alert-success">{{ message }}</div>
{% endif %}

<div class="card">
    <div class="card-body">
        <form method="post" class="row g-3" novalidate>
        <div class="col-md-6">
            <label class="form-label">Clinic Name</label>
            <input class="form-control" name="clinic_name" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">License Number</label>
            <input class="form-control" name="license_number" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Region</label>
            <input class="form-control" name="region" placeholder="Kuching" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Operating Hours</label>
            <input class="form-control" name="operating_hours" placeholder="9:00 AM - 6:00 PM" required>
        </div>
        <div class="col-12">
            <label class="form-label">Specialisations</label>
            <input class="form-control" name="specialisations" placeholder="small animals, emergency care">
        </div>
        <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input class="form-control" name="phone">
        </div>
        <div class="col-md-6">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" name="email">
        </div>
        <div class="col-12">
            <label class="form-label">Address</label>
            <input class="form-control" name="address">
        </div>
        <div class="col-12">
            <label class="form-label">Google Maps Link</label>
            <input class="form-control" name="maps_link">
        </div>
            <div class="col-12">
                <button class="btn btn-primary" type="submit">Add Vet Details</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
