{% extends "base.html" %}

{% block title %}Login | Pet First Aid{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h1 class="h4">Login</h1>
        <p>Demo accounts: owner@example.com / ownerpass, staff@example.com / staffpass, vet@example.com / vetpass</p>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" name="email_address" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" required>
            </div>
            <button class="btn btn-primary" type="submit">Login</button>
        </form>
    </div>
</div>
{% endblock %}
